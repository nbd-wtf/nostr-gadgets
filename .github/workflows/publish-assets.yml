name: publish-assets

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: jetli/wasm-pack-action@v0.4.0
      - name: build redstore wasm
        run: wasm-pack build --target web --out-dir pkg --release
        working-directory: redstore
      - name: commit wasm to orphan branch
        run: |
          TAG="${{ github.ref_name }}-redstorewasm"
          mkdir "/tmp/${TAG}"
          cp redstore/pkg/*.wasm "/tmp/${TAG}"
          git checkout --orphan "$TAG"
          git rm -rf .
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cp "/tmp/${TAG}/"*.wasm .
          git add .
          git commit -m "redstore wasm for ${{ github.ref_name }}"
          git tag "$TAG"
          git push origin "refs/tags/$TAG" --force
